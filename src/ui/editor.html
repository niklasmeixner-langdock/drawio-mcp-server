<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>draw.io</title>
    <style>
      :root {
        --bg: #ffffff;
        --fg: #09090b;
        --fg-muted: #71717a;
        --border: #e4e4e7;
        --btn-primary-bg: #18181b;
        --btn-primary-fg: #fafafa;
        --btn-secondary-bg: transparent;
        --btn-secondary-fg: #09090b;
        --accent: #ff6600;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", Roboto,
          sans-serif;
        font-size: 14px;
        line-height: 1.5;
        background: var(--bg);
        color: var(--fg);
        -webkit-font-smoothing: antialiased;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .diagram-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        width: 100%;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 14px;
        border-bottom: 1px solid var(--border);
        flex: 0 0 auto;
      }

      .title {
        font-weight: 600;
        font-size: 14px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .title .dot {
        width: 9px;
        height: 9px;
        border-radius: 2px;
        background: var(--accent);
        flex: 0 0 auto;
      }

      .actions {
        display: flex;
        gap: 8px;
        flex: 0 0 auto;
      }

      button {
        font-family: inherit;
        font-size: 13px;
        padding: 6px 12px;
        border-radius: 7px;
        border: 1px solid var(--border);
        background: var(--btn-secondary-bg);
        color: var(--btn-secondary-fg);
        cursor: pointer;
        transition: background 0.12s ease, opacity 0.12s ease;
      }

      button:hover:not(:disabled) {
        background: #f4f4f5;
      }

      button:disabled {
        opacity: 0.45;
        cursor: default;
      }

      .editor-wrap {
        position: relative;
        flex: 1 1 auto;
        min-height: 0;
      }

      iframe {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
      }

      .status {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 10px;
        color: var(--fg-muted);
        text-align: center;
        padding: 24px;
      }

      .status.hidden {
        display: none;
      }

      .spinner {
        width: 26px;
        height: 26px;
        border: 3px solid var(--border);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      .error {
        color: #b91c1c;
        max-width: 420px;
      }

      .error a {
        color: var(--accent);
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="diagram-container">
      <header>
        <div class="title"><span class="dot"></span><span id="title">Diagram</span></div>
        <div class="actions">
          <button id="export-png" disabled>Export PNG</button>
          <button id="export-svg" disabled>Export SVG</button>
          <button id="export-xml" disabled>Export XML</button>
        </div>
      </header>
      <div class="editor-wrap">
        <div id="status" class="status">
          <div class="spinner"></div>
          <div id="status-text">Loading editor…</div>
        </div>
        <!-- draw.io iframe is injected here once render data arrives -->
      </div>
    </div>

    <script type="module">
      // -----------------------------------------------------------------
      // MCP App bridge — identical wiring to the reference implementation,
      // so the host delivers initial render data the same way.
      // -----------------------------------------------------------------
      class App {
        constructor(options) {
          this.name = options.name;
          this.version = options.version;
          this.ontoolresult = null;
          this.onrenderdata = null;
          this._messageId = 0;
          this._pendingRequests = new Map();
          this._queuedMessages = [];
        }

        connect() {
          window.addEventListener("message", (event) => {
            const message = event.data;
            if (!message || typeof message !== "object") return;
            let renderData = null;

            if (
              message.method === "ui/notifications/tool-result" &&
              message.params?._meta?.["mcpui.dev/ui-initial-render-data"]
            ) {
              renderData =
                message.params._meta["mcpui.dev/ui-initial-render-data"];
            } else if (message.type === "renderData" && message.data) {
              renderData = message.data;
            } else if (
              (message.type === "init" || message.type === "initialData") &&
              message.data
            ) {
              renderData = message.data;
            } else if (message.xml && typeof message.xml === "string" && !message.event) {
              renderData = message;
            } else if (message.renderData) {
              renderData = message.renderData;
            }

            if (renderData) {
              if (this.onrenderdata) {
                this.onrenderdata(renderData);
              } else {
                this._queuedMessages.push(renderData);
              }
            }

            if (message.type === "toolResult" && this.ontoolresult) {
              this.ontoolresult(message.result);
            }

            if (
              message.jsonrpc === "2.0" &&
              message.id &&
              this._pendingRequests.has(message.id)
            ) {
              const { resolve, reject } = this._pendingRequests.get(message.id);
              this._pendingRequests.delete(message.id);
              if (message.error) {
                reject(new Error(message.error.message || "Tool call failed"));
              } else {
                resolve(message.result);
              }
            }
          });
          window.parent.postMessage({ type: "appReady", name: this.name }, "*");
        }

        processQueue() {
          while (this._queuedMessages.length > 0 && this.onrenderdata) {
            const data = this._queuedMessages.shift();
            this.onrenderdata(data);
          }
        }
      }

      // -----------------------------------------------------------------
      // draw.io embed wiring
      // -----------------------------------------------------------------
      const EMBED_URL =
        "https://embed.diagrams.net/?embed=1&proto=json&spin=1&libraries=1&ui=min";

      const EMPTY_XML =
        '<mxGraphModel><root><mxCell id="0"/><mxCell id="1" parent="0"/></root></mxGraphModel>';

      const app = new App({ name: "draw.io", version: "1.0.0" });
      const wrapEl = document.querySelector(".editor-wrap");
      const statusEl = document.getElementById("status");
      const statusTextEl = document.getElementById("status-text");
      const titleEl = document.getElementById("title");
      const exportButtons = {
        png: document.getElementById("export-png"),
        svg: document.getElementById("export-svg"),
        xml: document.getElementById("export-xml"),
      };

      let frame = null;
      let editorReady = false;
      let currentXml = EMPTY_XML;
      let initTimeout = null;

      function showStatus(text, isError) {
        statusEl.classList.remove("hidden");
        statusTextEl.className = isError ? "error" : "";
        statusTextEl.innerHTML = text;
        const spinner = statusEl.querySelector(".spinner");
        if (spinner) spinner.style.display = isError ? "none" : "block";
      }

      function hideStatus() {
        statusEl.classList.add("hidden");
      }

      function setExportEnabled(enabled) {
        for (const btn of Object.values(exportButtons)) btn.disabled = !enabled;
      }

      function getEmbeddedSchema() {
        if (window.DIAGRAM_DATA) return window.DIAGRAM_DATA;
        const container = document.querySelector(".diagram-container");
        const schemaAttr = container?.getAttribute("data-schema");
        if (schemaAttr) {
          try {
            return JSON.parse(schemaAttr);
          } catch (e) {
            console.error("Failed to parse schema from data attribute:", e);
          }
        }
        return null;
      }

      function postToEditor(msg) {
        if (frame?.contentWindow) {
          frame.contentWindow.postMessage(JSON.stringify(msg), "*");
        }
      }

      function ensureFrame() {
        if (frame) return;
        frame = document.createElement("iframe");
        frame.setAttribute("title", "draw.io editor");
        frame.setAttribute("allow", "clipboard-read; clipboard-write");
        frame.src = EMBED_URL;
        wrapEl.appendChild(frame);

        // If the embed never initializes (e.g. blocked by a strict CSP),
        // surface a helpful message instead of an endless spinner.
        initTimeout = setTimeout(() => {
          if (!editorReady) {
            showStatus(
              'Could not load the draw.io editor (embed.diagrams.net may be blocked). ' +
                'You can open the diagram at <a href="https://app.diagrams.net" target="_blank" rel="noopener">app.diagrams.net</a>.',
              true,
            );
          }
        }, 10000);
      }

      function loadDiagram(data) {
        if (data?.title) titleEl.textContent = data.title;
        if (data?.xml && typeof data.xml === "string") {
          currentXml = data.xml;
        }
        ensureFrame();
        // If the editor already sent `init`, push the new XML immediately;
        // otherwise it will be sent when `init` arrives.
        if (editorReady) {
          postToEditor({ action: "load", autosave: 1, xml: currentXml });
        }
      }

      // Messages coming back from the draw.io iframe (JSON protocol).
      window.addEventListener("message", (event) => {
        if (!frame || event.source !== frame.contentWindow) return;
        if (typeof event.data !== "string" || event.data.length === 0) return;
        let msg;
        try {
          msg = JSON.parse(event.data);
        } catch (e) {
          return;
        }

        switch (msg.event) {
          case "init":
            editorReady = true;
            if (initTimeout) clearTimeout(initTimeout);
            hideStatus();
            setExportEnabled(true);
            postToEditor({ action: "load", autosave: 1, xml: currentXml });
            break;
          case "save":
          case "autosave":
            if (msg.xml) currentXml = msg.xml;
            postToEditor({
              action: "status",
              messageKey: "allChangesSaved",
              modified: false,
            });
            break;
          case "export":
            handleExport(msg);
            break;
          default:
            break;
        }
      });

      // -----------------------------------------------------------------
      // Export
      // -----------------------------------------------------------------
      const EXPORT_FORMATS = {
        png: { action: "xmlpng", ext: "png", mime: "image/png" },
        svg: { action: "xmlsvg", ext: "svg", mime: "image/svg+xml" },
        xml: { action: "xml", ext: "drawio", mime: "application/xml" },
      };

      function requestExport(kind) {
        const fmt = EXPORT_FORMATS[kind];
        if (!fmt || !editorReady) return;
        postToEditor({ action: "export", format: fmt.action });
      }

      function handleExport(msg) {
        try {
          const ext =
            msg.format === "xml"
              ? "drawio"
              : msg.format && msg.format.includes("svg")
                ? "svg"
                : "png";
          const filename = `${(titleEl.textContent || "diagram").replace(/[^a-z0-9-_]+/gi, "-")}.${ext}`;
          let href = msg.data;
          if (!href || typeof href !== "string") {
            // `xml` exports may arrive as raw XML rather than a data URI.
            const raw = msg.xml || currentXml;
            href = URL.createObjectURL(
              new Blob([raw], { type: "application/xml" }),
            );
          } else if (!href.startsWith("data:") && !href.startsWith("blob:")) {
            href = URL.createObjectURL(
              new Blob([href], { type: "application/xml" }),
            );
          }
          const a = document.createElement("a");
          a.href = href;
          a.download = filename;
          document.body.appendChild(a);
          a.click();
          a.remove();
          if (href.startsWith("blob:")) setTimeout(() => URL.revokeObjectURL(href), 2000);
        } catch (e) {
          console.error("Export failed:", e);
        }
      }

      exportButtons.png.addEventListener("click", () => requestExport("png"));
      exportButtons.svg.addEventListener("click", () => requestExport("svg"));
      exportButtons.xml.addEventListener("click", () => requestExport("xml"));

      // -----------------------------------------------------------------
      // Boot
      // -----------------------------------------------------------------
      function boot() {
        const embedded = getEmbeddedSchema();

        // Late render data from the host (after the UI is shown).
        app.onrenderdata = (data) => loadDiagram(data);
        app.connect();

        if (embedded) {
          loadDiagram(embedded);
        } else {
          showStatus("Waiting for a diagram…", false);
        }

        app.processQueue();
      }

      boot();
    </script>
  </body>
</html>
